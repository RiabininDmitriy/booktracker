services:
  postgres:
    image: postgres:16-alpine
    container_name: pdp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booktracker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booktracker"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
