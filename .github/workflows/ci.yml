name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: booktracker
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d booktracker"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=10
    env:
      NODE_ENV: development
      JWT_SECRET: ci_jwt_secret
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/booktracker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Postgres client (for readiness check)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: pg_isready -h localhost -p 5433 -U postgres -d booktracker

      - name: Init DB schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5433 -U postgres -d booktracker -v ON_ERROR_STOP=1 -f db/init/01_schema.sql

      - name: API e2e tests
        run: pnpm --filter api test:e2e

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
